name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends default-jre plantuml

      - name: Validate .puml files
        run: |
          set -eo pipefail
          files=$(find . -name "*.puml" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./diagrams/*")

          if [ -z "$files" ]; then
            echo "No .puml files found, skipping validation."
            exit 0
          fi

          echo "$files" | while IFS= read -r file; do
            echo "Validating: $file"
            plantuml -checkonly "$file"
          done

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERR: Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $PKG_VERSION"

      - name: Verify version is not already published
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view diagram-sync@$PKG_VERSION version 2>/dev/null || echo "")
          if [ -n "$PUBLISHED" ]; then
            echo "ERR: Version $PKG_VERSION is already published on npm"
            exit 1
          fi
          echo "Version $PKG_VERSION is available, proceeding."

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
