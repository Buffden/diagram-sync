name: Generate Mermaid Diagrams

on:
  push:
    paths:
      - '**/*.mmd'
      - '**/*.mermaid'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Generate diagrams
        run: npx diagram-sync
